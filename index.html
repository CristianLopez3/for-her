<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/img/icon.png" sizes="16x16" />
    <title>Karen - Home</title>
    <link rel="stylesheet" href="./assets/css/theme.css" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/animations.css" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="home-container">

      <!-- Zone 1: Identity Hero -->
      <header class="hero-header">
        <div class="hero-profile">
          <div class="profile-icon" id="profileIcon">
            <img src="./assets/img/profile.jpeg" alt="Profile Image" class="profile-image" />
          </div>
          <div class="hero-identity">
            <h1 class="hero-name">Karen &amp; Cristian</h1>
            <p class="hero-days"><span id="dayCount">0</span> days together</p>
          </div>
        </div>
        <div id="heroCountdown"></div>
      </header>

      <!-- Zone 2: Navigation Grid -->
      <section class="home-section">
        <div class="nav-grid" id="navGrid"></div>
      </section>

      <!-- Zone 3: Read & Remember -->
      <section class="home-section">
        <h2 class="section-title">Read &amp; Remember</h2>
        <div class="note-card" id="noteCard"></div>
      </section>

      <!-- Zone 4: Special Moments -->
      <section class="home-section">
        <h2 class="section-title">Let&#39;s check some of our special moments</h2>
        <a class="moment-card" id="momentCard" href="#"></a>
      </section>

    </div>

    <!-- Invitation Modal -->
    <div class="invitation-modal" id="invitationModal">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-card">
        <button class="modal-close" id="modalClose" aria-label="Cerrar Modal">
          <i class="fas fa-times"></i>
        </button>

        <div class="modal-header">
          <i class="fas fa-envelope-open-text modal-icon"></i>
          <h2 class="modal-title">Vacations Date</h2>
        </div>

        <div class="modal-body">
          <div class="invitation-detail">
            <div class="detail-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div class="detail-content">
              <h3 class="detail-label">Lugar</h3>
              <p class="detail-value" id="invitationPlace"></p>
            </div>
          </div>
          <div class="invitation-detail">
            <div class="detail-icon"><i class="fas fa-calendar-alt"></i></div>
            <div class="detail-content">
              <h3 class="detail-label">Fecha y Hora</h3>
              <p class="detail-value" id="invitationDate"></p>
            </div>
          </div>
          <div class="invitation-detail">
            <div class="detail-icon"><i class="fas fa-tshirt"></i></div>
            <div class="detail-content">
              <h3 class="detail-label">Código de Vestimenta</h3>
              <p class="detail-value" id="invitationDressCode"></p>
            </div>
          </div>
          <div class="invitation-detail">
            <div class="detail-icon"><i class="fas fa-heart"></i></div>
            <div class="detail-content">
              <h3 class="detail-label">¿Qué Haremos?</h3>
              <p class="detail-value" id="invitationActivity"></p>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <a href="#" class="whatsapp-btn" id="whatsappBtn" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span>Confirm via WhatsApp</span>
          </a>
        </div>
      </div>
    </div>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
